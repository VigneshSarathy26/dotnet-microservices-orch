version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: orchestrator-rabbitmq
    ports:
      - "5672:5672"   # AMQP protocol port
      - "15672:15672" # Management UI port
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  orchestrator:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: orchestrator-worker
    depends_on:
      rabbitmq:
        condition: service_healthy
      database:
        condition: service_healthy
    environment:
      - DOTNET_ENVIRONMENT=Development
      - ConnectionStrings__SagaDatabase=Server=database,1433;Database=OrderSagaDb;User Id=sa;Password=YourS!cretP@ssw0rd;Encrypt=True;TrustServerCertificate=True;
      - RabbitMq__Host=rabbitmq

    ports:
      # Export standard .NET metric endpoint
      - "8080:8080" 
    
  prometheus:
    image: prom/prometheus:latest
    container_name: orchestrator-prometheus
    ports:
      - "9090:9090"
    volumes:
      # Bind mounts the Prometheus scraper configuration
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - orchestrator

  grafana:
    image: grafana/grafana:latest
    container_name: orchestrator-grafana
    ports:
      - "3000:3000"
    environment:
      # Default grafana creds: admin / admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus

  database:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: orchestrator-db
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourS!cretP@ssw0rd
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P YourS!cretP@ssw0rd -C -Q 'SELECT 1' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
